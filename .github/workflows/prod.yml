name: Production deployment

on:
  push:
    branches:
      - master

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: 'master'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel config
        run:
          vercel pull --yes --environment=production --token=${{
          secrets.VERCEL_TOKEN }}

      - name: Build
        run:
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$url" >> "$GITHUB_OUTPUT"

      - name: Set alias
        run:
          vercel alias set ${{ steps.deploy.outputs.deploy_url }}
          cardano-documentation.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
          --scope=${{ secrets.VERCEL_ORG_ID }}
